[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:mosquitto]
command=/usr/sbin/mosquitto -c /config/mosquitto.conf
stdout_logfile=/var/log/supervisor/mosquitto-stdout.log
stderr_logfile=/var/log/supervisor/mosquitto-stderr.log
autorestart=true
startsecs=3
priority=10

[program:mqtt-manager-core]
command=/usr/local/bin/mqtt-manager-core
stdout_logfile=/var/log/supervisor/mqtt-manager-stdout.log
stderr_logfile=/var/log/supervisor/mqtt-manager-stderr.log
autorestart=true
startsecs=5
priority=20
environment=MQTT_HOST="localhost",MQTT_PORT="1883",SERVER_PORT="8000",MQTT_CONFIG_DIR="/config"
